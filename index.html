<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Tiny Transport</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="topbar">
  <button id="btnMenu">☰</button>
  <button id="btnRot">⟳</button>
  <div id="money">$0</div>
  <div id="date">Jan 1, 1950</div>
  <div id="speed">
    <button data-speed="0">⏸</button><button data-speed="1" class="on">▶</button><button data-speed="2">▶▶</button><button data-speed="4">▶▶▶</button>
  </div>
</div>

<div id="toolbar">
  <button class="tool on" data-tool="select">👆<span>Select</span></button>
  <button class="tool" data-tool="road">🛣️<span>Road</span></button>
  <button class="tool" data-tool="rail">🛤️<span>Rail</span></button>
  <button class="tool" data-tool="bus">🚏<span>Bus stop</span></button>
  <button class="tool" data-tool="truck">📦<span>Truck stop</span></button>
  <button class="tool" data-tool="train">🚉<span>Rail stn</span></button>
  <button class="tool" data-tool="rdepot">🛻<span>Rd depot</span></button>
  <button class="tool" data-tool="tdepot">🚧<span>Rl depot</span></button>
  <button class="tool" data-tool="bulldoze">🧨<span>Demolish</span></button>
  <button class="tool" data-panel="lines">🧭<span>Lines</span></button>
  <button class="tool" data-panel="finance">💰<span>Money</span></button>
</div>

<div id="banner" class="hidden"></div>

<div id="panel" class="hidden">
  <div id="panelHead"><div id="panelTitle"></div><button id="panelClose">✕</button></div>
  <div id="panelBody"></div>
</div>

<div id="toast" class="hidden"></div>

<script src="js/lib/three.min.js"></script>
<script src="js/util.js"></script>
<script src="js/data.js"></script>
<script src="js/path.js"></script>
<script src="js/game.js"></script>
<script src="js/map.js"></script>
<script src="js/build.js"></script>
<script src="js/vehicles.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
<script src="js/save.js"></script>
<script src="js/main.js"></script>
</body>
</html>
