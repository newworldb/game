<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e7461">
<meta name="description" content="BudgetTrip — วางแผนงบเที่ยวไทยใน 30 วินาที | Plan your Thailand trip budget in 30 seconds.">
<title>BudgetTrip 🇹🇭</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="top">
  <div class="brand">🌴 <b>Budget</b>Trip <span class="flag">🇹🇭</span></div>
  <div id="tagline" class="tag"></div>
  <button id="langBtn">EN</button>
</header>

<main id="view"></main>

<footer>BudgetTrip · MVP · <a href="https://github.com/newworldb/game" rel="noopener">GitHub</a></footer>

<div id="toast" class="hidden"></div>

<script src="js/bundle.js"></script>
<script>
window.addEventListener('load', function(){
  if (typeof App === 'undefined' || typeof Core === 'undefined'){
    document.body.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;font-family:system-ui">' +
      '<div style="font-size:40px">🌴</div><div style="color:#777">Network hiccup while loading…</div>' +
      '<button onclick="location.reload()" style="background:#0e7461;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-weight:700">Tap to retry</button></div>';
  }
});
</script>
</body>
</html>
